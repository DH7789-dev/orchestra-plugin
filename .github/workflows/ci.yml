name: CI — Package Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  package:
    name: Build .vsix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dev dependencies
        run: npm install

      - name: Lint (basic syntax check)
        run: node -e "require('./src/extension.js')" || true

      - name: Package extension
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-orchestra-vsix
          path: "*.vsix"
          retention-days: 30

      - name: Upload to Release (on tag)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
